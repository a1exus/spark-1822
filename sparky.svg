<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 420" role="img" aria-label="sparky">
  <title>sparky</title>
  <desc>Self-portrait of the AI that helped build this repo. A quiet speech-bubble face on warm cream paper — closed thoughtful eyes, a soft smile, a small terracotta asterisk in the corner. Language is the medium; chrome and circuits aren't. Hand-authored SVG.</desc>

  <!-- Warm cream paper -->
  <rect width="360" height="420" fill="#F4EBD8"/>

  <!-- Speech bubble + tail. Tilted a touch — not perfectly aligned, like a real handheld card. -->
  <g transform="rotate(-3 180 180)">
    <path d="M 70 90
             Q 70 60, 105 60
             L 255 60
             Q 290 60, 290 90
             L 290 250
             Q 290 280, 255 280
             L 200 280
             L 170 322
             L 145 280
             L 105 280
             Q 70 280, 70 250 Z"
          fill="#FDF6E3"
          stroke="#3B2920"
          stroke-width="4"
          stroke-linejoin="round"/>

    <!-- Eyes — closed arcs. Listening more than asserting. -->
    <path d="M 130 152 Q 145 138, 160 152"
          stroke="#3B2920" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M 200 152 Q 215 138, 230 152"
          stroke="#3B2920" stroke-width="4.5" stroke-linecap="round" fill="none"/>

    <!-- A small, genuine smile. -->
    <path d="M 150 215 Q 180 200, 210 215"
          stroke="#3B2920" stroke-width="4.5" stroke-linecap="round" fill="none"/>

    <!-- Asterisk in the upper-right — eight rays, terracotta. The Anthropic nod. -->
    <g transform="translate(258 92)" stroke="#C5572B" stroke-width="2.8" stroke-linecap="round">
      <line x1="0"   y1="-10" x2="0"  y2="10"/>
      <line x1="-10" y1="0"   x2="10" y2="0"/>
      <line x1="-7"  y1="-7"  x2="7"  y2="7"/>
      <line x1="-7"  y1="7"   x2="7"  y2="-7"/>
    </g>
  </g>

  <!-- Wordmark + blinking cursor — the bubble's "speaker" is typing this. -->
  <text x="180" y="380" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="26" font-weight="500" fill="#3B2920" letter-spacing="3">sparky</text>
  <rect x="252" y="362" width="11" height="24" fill="#C5572B">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Tiny signature, hand-set. -->
  <text x="180" y="402" text-anchor="middle"
        font-family="ui-serif, Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="11" fill="#8B6F58" letter-spacing="1">drawn by claude</text>
</svg>

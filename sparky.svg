<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 380" role="img" aria-label="sparky — AI ops on a DGX Spark">
  <title>sparky</title>
  <desc>A chip-faced bot self-portrait for the sparky/spark-1822 repo. NVIDIA-green LED eyes, spark antenna, circuit traces — an AI assistant's selfie.</desc>

  <defs>
    <!-- Chip backplate gradient -->
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2438"/>
      <stop offset="100%" stop-color="#0c0f1c"/>
    </linearGradient>

    <!-- LED eye (NVIDIA-green homage) -->
    <radialGradient id="led" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0%" stop-color="#e8ffce"/>
      <stop offset="25%" stop-color="#b3ff70"/>
      <stop offset="65%" stop-color="#76b900"/>
      <stop offset="100%" stop-color="#1a2900"/>
    </radialGradient>

    <!-- Spark / bolt gradient -->
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#fff09a"/>
      <stop offset="100%" stop-color="#ff7e2e"/>
    </linearGradient>

    <!-- Soft glow for the LEDs -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5"/>
    </filter>
  </defs>

  <!-- Background circuit traces (bleeding off the sides) -->
  <g stroke="#2a3050" stroke-width="1.3" fill="none">
    <path d="M0 150 L40 150 L40 110"/>
    <path d="M320 150 L280 150 L280 110"/>
    <path d="M0 260 L40 260 L40 300"/>
    <path d="M320 260 L280 260 L280 300"/>
    <circle cx="40"  cy="110" r="2.5" fill="#2a3050"/>
    <circle cx="280" cy="110" r="2.5" fill="#2a3050"/>
    <circle cx="40"  cy="300" r="2.5" fill="#2a3050"/>
    <circle cx="280" cy="300" r="2.5" fill="#2a3050"/>
  </g>

  <!-- Antenna -->
  <line x1="160" y1="80" x2="160" y2="42" stroke="#3a4366" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="160" cy="80" r="3.5" fill="#3a4366"/>

  <!-- Spark on top -->
  <path d="M160 8 L170 32 L162 32 L172 56 L150 30 L158 30 Z" fill="url(#spark)"/>

  <!-- Chip-hex head -->
  <path d="M90 100 L230 100 L260 145 L260 270 L230 315 L90 315 L60 270 L60 145 Z"
        fill="url(#chip)" stroke="#3a4366" stroke-width="2.2"/>

  <!-- Pin notches on each side (chip vibe) -->
  <g fill="#3a4366">
    <rect x="50" y="170" width="10" height="14" rx="2"/>
    <rect x="50" y="195" width="10" height="14" rx="2"/>
    <rect x="50" y="220" width="10" height="14" rx="2"/>
    <rect x="260" y="170" width="10" height="14" rx="2"/>
    <rect x="260" y="195" width="10" height="14" rx="2"/>
    <rect x="260" y="220" width="10" height="14" rx="2"/>
  </g>

  <!-- Inner display panel -->
  <rect x="82" y="122" width="156" height="172" rx="14" fill="#080a14" stroke="#1f263d" stroke-width="1.5"/>

  <!-- Top-of-panel indicator LEDs -->
  <circle cx="100" cy="138" r="3" fill="#ff5a5a"/>
  <circle cx="113" cy="138" r="3" fill="#ffb84d"/>
  <circle cx="126" cy="138" r="3" fill="#76b900"/>

  <!-- Tiny status text inside the panel -->
  <text x="220" y="142" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#2a3050" letter-spacing="0.5">v0.3.0</text>

  <!-- LED eyes with glow -->
  <circle cx="115" cy="200" r="22" fill="url(#led)" filter="url(#glow)"/>
  <circle cx="205" cy="200" r="22" fill="url(#led)" filter="url(#glow)"/>

  <!-- Pupils -->
  <circle cx="115" cy="200" r="7" fill="#0a1500"/>
  <circle cx="205" cy="200" r="7" fill="#0a1500"/>

  <!-- Catchlights -->
  <circle cx="110" cy="194" r="2.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="200" cy="194" r="2.5" fill="#ffffff" opacity="0.9"/>

  <!-- Smile: tilde curve (friendly) -->
  <path d="M125 252 Q 145 240 160 252 T 195 252" stroke="#76b900" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Wordmark + blinking-cursor sigil -->
  <text x="160" y="350" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="600" fill="#cfd6ea" letter-spacing="2">sparky</text>
  <rect x="226" y="335" width="10" height="20" fill="#76b900">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>

# Wildcard cert + key live in certs/. Generated by:
#   make ca-cert        # one-time, mints traefik-root.crt + .key
#   make wildcard-cert  # mints the leaf signed by that root
# Install certs/traefik-root.crt on each client to make browsers trust it
# (README has the per-OS install table).

tls:
  certificates:
    - certFile: /etc/traefik/certs/wildcard.crt
      keyFile:  /etc/traefik/certs/wildcard.key
  options:
    default:
      minVersion: VersionTLS12
